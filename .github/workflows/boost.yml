name: Generate Activity and Pull Requests
on:
  schedule:
    - cron: '0 12 * * *' # Automatically runs every day at 12:00 PM UTC
  workflow_dispatch: # Keeps the manual button active so you can run it right now

jobs:
  run-automation:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write # Required permission to open and close official web PRs
  
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Execute 15 Real PRs and 700 Daily Commits
      env:
        GH_TOKEN: ${{ github.token }} # Authorizes the gh CLI tool to make web PRs
      run: |
        git config --local user.email "bashirfullstack3@gmail.com"
        git config --local user.name "Bashir-FullStack"
        
        # 1. LOOP FOR REAL WEB PULL REQUEST MERGES (For Silver Pull Shark)
        for i in {1..15}; do
          git checkout main
          git checkout -b real-pr-branch-$i
          echo "PR Update $i" >> activity.txt
          git add activity.txt
          git commit -m "Automated pull request feature $i"
          git push origin real-pr-branch-$i
          
          # Creates a real web PR and uses the server to officially merge it
          gh pr create --title "Automated PR $i" --body "Fixing template assets" --base main --head real-pr-branch-$i
          gh pr merge --merge --delete-branch
        done

        # 2. LOOP FOR 700 DAILY GRAPH CONTRIBUTIONS
        git checkout main
        for i in {1..700}; do
          echo "Contribution $i" >> activity.txt
          git add activity.txt
          git commit -m "Automated contribution $i"
        done
        git push origin main
